<!DOCTYPE html>
<html>
<head>
<title>PMU Advanced Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#111; color:#fff; font-family:Arial; }
.container { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.card { background:#222; padding:20px; border-radius:10px; }
.alert { color:red; font-weight:bold; }
</style>
</head>

<body>

<h1>⚡ PMU Dashboard (Industry Level)</h1>

<div class="container">

  <div class="card">
    <canvas id="voltageChart"></canvas>
  </div>

  <div class="card">
    <canvas id="waveChart"></canvas>
  </div>

  <div class="card">
    <h3>Live Data</h3>
    <p id="data"></p>
    <p id="location"></p>
    <p id="alert" class="alert"></p>

    <button onclick="loadHistory()">History</button>
    <button onclick="replay()">Replay</button>
  </div>

</div>

<script>
const ws = new WebSocket("wss://pmu-dashboard.onrender.com");

// Voltage Chart
const vChart = new Chart(document.getElementById('voltageChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: "Voltage", data: [] }] }
});

// Waveform Chart
const wChart = new Chart(document.getElementById('waveChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: "Waveform", data: [] }] }
});

let t = 0;

// ===============================
// LIVE DATA
// ===============================
ws.onmessage = (e) => {
    let d = JSON.parse(e.data);

    document.getElementById("data").innerText =
        `V:${d.voltage} | Phase:${d.phase} | F:${d.frequency}`;

    document.getElementById("location").innerText =
        `Lat:${d.lat} Lon:${d.lon}`;

    // Attack alert
    if(d.attack){
        document.getElementById("alert").innerText = "⚠️ CYBER ATTACK DETECTED!";
    } else {
        document.getElementById("alert").innerText = "";
    }

    addVoltage(d);
    generateWave(d.voltage);
};

// ===============================
// GRAPH FUNCTIONS
// ===============================
function addVoltage(d){
    vChart.data.labels.push(d.timestamp);
    vChart.data.datasets[0].data.push(d.voltage);

    if(vChart.data.labels.length > 50){
        vChart.data.labels.shift();
        vChart.data.datasets[0].data.shift();
    }
    vChart.update();
}

function generateWave(v){
    let val = v * Math.sin(t);
    t += 0.2;

    wChart.data.labels.push('');
    wChart.data.datasets[0].data.push(val);

    if(wChart.data.labels.length > 100){
        wChart.data.labels.shift();
        wChart.data.datasets[0].data.shift();
    }
    wChart.update();
}

// ===============================
// HISTORY
// ===============================
async function loadHistory(){
    let res = await fetch('/history');
    let data = await res.json();

    vChart.data.labels = [];
    vChart.data.datasets[0].data = [];

    data.forEach(d => addVoltage(d));
}

// ===============================
// REPLAY
// ===============================
async function replay(){
    let res = await fetch('/replay');
    let data = await res.json();

    let i = 0;
    let interval = setInterval(()=>{
        addVoltage(data[i]);
        i++;
        if(i >= data.length) clearInterval(interval);
    }, 500);
}
</script>

</body>
</html>
